<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Users | TYS POS</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>

<div class="app-shell">

<header class="topbar">
    <div>
        <p class="eyebrow">Users</p>
        <h1>Cashier Users</h1>
    </div>

    <div class="status-card">
        <strong>TYS General Store</strong>

        <nav class="top-nav">
            <a href="index.html" class="nav-link">POS</a>
            <a href="inventory.html" class="nav-link">Inventory</a>
            <a href="purchases.html" class="nav-link">Purchases</a>
            <a href="suppliers.html" class="nav-link">Suppliers</a>
            <a href="customers.html" class="nav-link">Customers</a>
            <a href="profit.html" class="nav-link">Profit</a>
            <a href="expenses.html" class="nav-link">Expenses</a>
            <a href="reports.html" class="nav-link">Reports</a>
            <a href="stock.html" class="nav-link">Stock</a>
            <a href="settings.html" class="nav-link">Settings</a>
            <a href="backup.html" class="nav-link">Backup</a>
        </nav>
    </div>
</header>

<main class="panel">

    <div class="section-heading">
        <h2>User Management</h2>
        <p>Add and manage cashier users.</p>
    </div>

    <div class="stats-grid">

        <div class="stat-card">
            <span>Total Users</span>
            <strong id="user-count">0</strong>
        </div>

        <div class="stat-card">
            <span>Active Users</span>
            <strong id="active-user-count">0</strong>
        </div>

        <div class="stat-card">
            <span>Admins</span>
            <strong id="admin-count">0</strong>
        </div>

    </div>

    <div class="inventory-card">
        <h3>Add User</h3>

        <form id="user-form">

            <div class="form-grid">

                <div class="field">
                    <label>Full Name</label>
                    <input id="user-name" type="text" required>
                </div>

                <div class="field">
                    <label>Role</label>
                    <select id="user-role">
                        <option value="Cashier">Cashier</option>
                        <option value="Manager">Manager</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>

                <div class="field">
                    <label>Status</label>
                    <select id="user-status">
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>

                <div class="field">
                    <label>Phone</label>
                    <input id="user-phone" type="text">
                </div>

            </div>

            <div class="form-actions">
                <button class="primary-btn" type="submit">Save User</button>
                <button class="secondary-btn" type="reset">Clear</button>
            </div>

        </form>
    </div>

    <div class="inventory-card">
        <h3>User List</h3>

        <table class="inventory-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Phone</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="user-list">
                <tr>
                    <td colspan="5">
                        <div class="empty-state">No users saved.</div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</main>

</div>

<script src="inventory-seed.js"></script>
<script src="js/database.js"></script>
<script src="js/utils.js"></script>
<script src="js/users.js"></script>

</body>
</html>
