<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Corrections | TYS POS</title><link rel="stylesheet" href="styles.css"></head><body data-admin-page><div class="app-shell"><header class="topbar"><div><p class="eyebrow">Inventory</p><h1>Corrections & Adjustments</h1></div><div class="status-card"><strong>TYS General Store</strong><nav id="main-navigation" class="top-nav"></nav></div></header><main class="panel"><div class="section-heading"><h2>Correct stock and cost errors</h2><p>Use a clear adjustment instead of creating a second incorrect purchase.</p></div><div class="inventory-card"><form id="adjustment-form"><div class="form-grid"><div class="field"><label>Product</label><select id="adjustment-product" required></select></div><div class="field"><label>Quantity change</label><input id="adjustment-qty" type="number" step="0.001" value="0"><small>Use + to add stock or − to remove stock.</small></div><div class="field"><label>New cost price (optional)</label><input id="adjustment-cost" type="number" min="0" step="0.01"></div><div class="field"><label>Reason</label><input id="adjustment-reason" required placeholder="Data entry error, damage, supplier correction"></div></div><div class="form-actions"><button class="primary-btn">Apply Adjustment</button></div></form></div><div class="inventory-card"><h3>Adjustment History</h3><table class="inventory-table"><thead><tr><th>Date</th><th>Source</th><th>Product</th><th>Quantity change</th><th>Old cost</th><th>New cost</th><th>User</th><th>Details / Reason</th></tr></thead><tbody id="adjustment-list"></tbody></table></div></main></div><script src="inventory-seed.js"></script><script src="js/database.js"></script><script src="js/utils.js"></script><script src="js/adjustments.js"></script><script src="js/navigation.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/supabase-config.js"></scrip
