<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Settings | TYS POS</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>

<body data-admin-page>

<div class="app-shell">

<header class="topbar">
    <div>
        <p class="eyebrow">Settings</p>
        <h1>System Settings</h1>
    </div>

    <div class="status-card">
        <strong>TYS General Store</strong>

        <nav
    id="main-navigation"
    class="top-nav">
</nav>
    </div>
</header>

<main class="panel">

    <div class="section-heading">
        <h2>Store Settings</h2>
        <p>Customize your store details, receipt and system preferences.</p>
    </div>

    <div class="inventory-card">

        <form id="settings-form">

            <div class="form-grid">

                <div class="field">
                    <label>Store Name</label>
                    <input id="setting-store-name" type="text">
                </div>

                <div class="field">
                    <label>Phone Number</label>
                    <input id="setting-phone" type="text">
                </div>

                <div class="field full">
                    <label>Store Address</label>
                    <textarea id="setting-address" rows="3"></textarea>
                </div>

                <div class="field">
                    <label>Currency</label>
                    <input id="setting-currency" type="text" placeholder="KSh">
                </div>

                <div class="field">
                    <label>Default Low Stock Level</label>
                    <input id="setting-low-stock" type="number" min="1">
                </div>

                <div class="field full">
                    <label>Receipt Footer</label>
                    <textarea id="setting-receipt-footer" rows="3"></textarea>
                </div>

            </div>

            <div class="form-actions">
                <button type="submit" class="primary-btn">
                    Save Settings
                </button>

                <button type="button" id="reset-settings-btn" class="secondary-btn">
                    Reset Default
                </button>
            </div>

        </form>

    </div>

</main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>

<script src="js/auth-guard.js"></script>
<script src="js/user-session.js"></script>
<script src="js/admin-ui-guard.js"></script>
<script src="js/role-guard.js"></script>

<script src="js/database.js"></script>
<script src="js/utils.js"></script>

<script src="js/cloud-data.js"></script>
<script src="js/settings.js"></script>
<script src="js/navigation.js"></script>
<script src="js/pwa-register.js"></script>
</body>
</html>
