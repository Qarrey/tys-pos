<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login | TYS General Store POS</title>

    <link
        rel="stylesheet"
        href="styles.css">

</head>

<body>

<div class="app-shell">

    <main class="login-page">

        <section class="login-card">

            <div class="login-header">

                <p class="eyebrow">
                    TYS POS
                </p>

                <h1>
                    Welcome Back
                </h1>

                <p>
                    Sign in to access TYS General Store POS.
                </p>

            </div>


            <form id="login-form">

                <div class="field">

                    <label for="login-email">

                        Email Address

                    </label>

                    <input

                        id="login-email"

                        type="email"

                        placeholder="Enter your email"

                        autocomplete="email"

                        required>

                </div>


                <div class="field">

                    <label for="login-password">

                        Password

                    </label>

                    <input

                        id="login-password"

                        type="password"

                        placeholder="Enter your password"

                        autocomplete="current-password"

                        required>

                </div>


                <button

                    id="login-btn"

                    class="primary-btn"

                    type="submit">

                    Sign In

                </button>


                <div

                    id="login-message"

                    class="feedback-message">

                </div>

            </form>

        </section>

    </main>

</div>


<!-- SUPABASE -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase-config.js"></script>


<!-- LOGIN -->

<script src="js/login.js"></script>


</body>

</html>
