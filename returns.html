<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Returns & Refunds | TYS POS</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>

<div class="app-shell">

<header class="topbar">
    <div>
        <p class="eyebrow">Returns</p>
        <h1>Returns & Refunds</h1>
    </div>

    <div class="status-card">
        <strong>TYS General Store</strong>

        <nav class="top-nav">
            <a href="index.html" class="nav-link">POS</a>
            <a href="inventory.html" class="nav-link">Inventory</a>
            <a href="purchases.html" class="nav-link">Purchases</a>
            <a href="profit.html" class="nav-link">Profit</a>
            <a href="reports.html" class="nav-link">Reports</a>
            <a href="stock.html" class="nav-link">Stock</a>
        </nav>
    </div>
</header>

<main class="panel">

    <div class="section-heading">
        <h2>Return a Sale</h2>
        <p>Select a sale and return items back to stock.</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span>Total Returns</span>
            <strong id="return-count">0</strong>
        </div>

        <div class="stat-card">
            <span>Total Refunded</span>
            <strong id="return-total">KSh 0.00</strong>
        </div>
    </div>

    <div class="inventory-card">
        <h3>Process Return</h3>

        <form id="return-form">

            <div class="form-grid">

                <div class="field">
                    <label>Sale</label>
                    <select id="return-sale" required>
                        <option value="">Select Sale</option>
                    </select>
                </div>

                <div class="field">
                    <label>Item</label>
                    <select id="return-item" required>
                        <option value="">Select Item</option>
                    </select>
                </div>

                <div class="field">
                    <label>Quantity Returned</label>
                    <input id="return-qty" type="number" min="0.01" step="0.01" required>
                </div>

                <div class="field">
                    <label>Reason</label>
                    <input id="return-reason" type="text" placeholder="Damaged, wrong item, customer returned">
                </div>

            </div>

            <div class="form-actions">
                <button class="primary-btn" type="submit">Save Return</button>
                <button class="secondary-btn" type="reset">Clear</button>
            </div>

        </form>
    </div>

    <div class="inventory-card">
        <h3>Return History</h3>

        <table class="inventory-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Sale ID</th>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Refund</th>
                    <th>Reason</th>
                </tr>
            </thead>

            <tbody id="return-list">
                <tr>
                    <td colspan="6">
                        <div class="empty-state">No returns recorded.</div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</main>

</div>

<script src="inventory-seed.js"></script>
<script src="js/database.js"></script>
<script src="js/utils.js"></script>
<script src="js/returns.js"></script>

</body>
</html>
