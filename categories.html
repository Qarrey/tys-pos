<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Categories | TYS POS</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>

<div class="app-shell">

<header class="topbar">
    <div>
        <p class="eyebrow">Products</p>
        <h1>Categories</h1>
    </div>

    <div class="status-card">
        <strong>TYS General Store</strong>

       <nav
    id="main-navigation"
    class="top-nav">
</nav>
    </div>
</header>

<main class="panel">

    <div class="section-heading">
        <h2>Product Categories</h2>
        <p>Create and manage product categories.</p>
    </div>

    <div class="inventory-card">
        <h3>Add Category</h3>

        <form id="category-form">
            <div class="form-grid">
                <div class="field">
                    <label>Category Name</label>
                    <input id="category-name" type="text" required>
                </div>

                <div class="field">
                    <label>Description</label>
                    <input id="category-description" type="text">
                </div>
            </div>

            <div class="form-actions">
                <button class="primary-btn" type="submit">Save Category</button>
                <button class="secondary-btn" type="reset">Clear</button>
            </div>
        </form>
    </div>

    <div class="inventory-card">
        <h3>Category List</h3>

        <table class="inventory-table">
            <thead>
                <tr>
                    <th>Category</th>
                    <th>Description</th>
                    <th>Products</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="category-list">
                <tr>
                    <td colspan="4">
                        <div class="empty-state">No categories saved.</div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</main>

</div>

<script src="inventory-seed.js"></script>
<script src="js/database.js"></script>
<script src="js/utils.js"></script>
<script src="js/categories.js"></script>
<script src="js/navigation.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase-config.js"></script>

<script src="js/auth-guard.js"></script>

<script src="js/user-session.js"></script>

<script src="js/role-guard.js"></script>

</body>
</html>
