<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Monthly Summary | TYS POS</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>

<body data-admin-page>

<div class="app-shell">

<header class="topbar">
    <nav
    id="main-navigation"
    class="top-nav">
</nav>
</header>

<main class="panel">

    <div class="section-heading">
        <h2>This Month</h2>
        <p>Review revenue, profit, expenses and items sold for the current month.</p>
    </div>

    <div class="stats-grid">

        <div class="stat-card">
            <span>Monthly Revenue</span>
            <strong id="monthly-revenue">KSh 0.00</strong>
        </div>

        <div class="stat-card">
            <span>Gross Profit</span>
            <strong id="monthly-gross-profit">KSh 0.00</strong>
        </div>

        <div class="stat-card">
            <span>Expenses</span>
            <strong id="monthly-expenses">KSh 0.00</strong>
        </div>

        <div class="stat-card">
            <span>Net Profit</span>
            <strong id="monthly-net-profit">KSh 0.00</strong>
        </div>

        <div class="stat-card">
            <span>Sales Count</span>
            <strong id="monthly-sales-count">0</strong>
        </div>

        <div class="stat-card">
            <span>Items Sold</span>
            <strong id="monthly-items-sold">0</strong>
        </div>

    </div>

    <div class="inventory-card">
        <h3>Actions</h3>

        <button id="print-monthly-summary" class="primary-btn">
            Print Monthly Summary
        </button>
    </div>

    <div class="inventory-card">
        <h3>Monthly Sales</h3>

        <table class="inventory-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Items</th>
                    <th>Revenue</th>
                    <th>Profit</th>
                    <th>Payment</th>
                </tr>
            </thead>

            <tbody id="monthly-sales-list">
                <tr>
                    <td colspan="5">
                        <div class="empty-state">No sales this month.</div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</main>

</div>

<script src="inventory-seed.js"></script>
<script src="js/database.js"></script>
<script src="js/utils.js"></script>
<script src="js/cloud-sales.js"></script>
<script src="js/monthly-summary.js"></script>
<script src="js/navigation.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase-config.js"></script>

<script src="js/auth-guard.js"></script>

<script src="js/user-session.js"></script>
<script src="js/admin-ui-guard.js"></script>

<script src="js/role-guard.js"></script>

</body>
</html>
