<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Profit & Expenses | TYS POS</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>

<body data-admin-page>

<div class="app-shell">

<header class="topbar">

        <div>

            <p class="eyebrow">
                Point of Sale
            </p>

            <h1>
                TYS General Store
            </h1>

        </div>


        <div class="status-card">

            <strong>
                TYS General Store
            </strong>


            <nav
    id="main-navigation"
    class="top-nav">
</nav>
        </div>

    </header>

<main class="panel">

    <div class="section-heading">
        <h2>Profit Dashboard</h2>
        <p>Track revenue, profit and business expenses.</p>
    </div>

    <div class="stats-grid">

        <div class="stat-card">
            <span>Today Revenue</span>
            <strong id="profit-today-revenue">KSh 0.00</strong>
        </div>

        <div class="stat-card">
            <span>Today Profit</span>
            <strong id="profit-today-profit">KSh 0.00</strong>
        </div>

        <div class="stat-card">
            <span>Total Expenses</span>
            <strong id="profit-total-expenses">KSh 0.00</strong>
        </div>

        <div class="stat-card">
            <span>Net Profit</span>
            <strong id="profit-net-profit">KSh 0.00</strong>
        </div>

    </div>

    <div class="inventory-card">
        <h3>Add Expense</h3>

        <form id="expense-form">

            <div class="form-grid">

                <div class="field">
                    <label>Expense Name</label>
                    <input id="expense-name" type="text" required>
                </div>

                <div class="field">
                    <label>Category</label>
                    <input id="expense-category" type="text" placeholder="Rent, transport, salary">
                </div>

                <div class="field">
                    <label>Amount</label>
                    <input id="expense-amount" type="number" min="0" step="0.01" required>
                </div>

                <div class="field">
                    <label>Date</label>
                    <input id="expense-date" type="date">
                </div>

            </div>

            <div class="form-actions">
                <button class="primary-btn" type="submit">Save Expense</button>
                <button class="secondary-btn" type="reset">Clear</button>
            </div>

        </form>
    </div>

    <div class="inventory-card">
        <h3>Expense History</h3>

        <table class="inventory-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Expense</th>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="expense-list">
                <tr>
                    <td colspan="5">
                        <div class="empty-state">No expenses recorded.</div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</main>

</div>

<script src="inventory-seed.js"></script>
<script src="js/database.js"></script>
<script src="js/utils.js"></script>
<script src="js/cloud-sales.js"></script>
<script src="js/profit.js"></script>
<script src="js/expenses.js"></script>
<script src="js/reports.js"></script>
<script src="app.js"></script>
<script src="js/navigation.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase-config.js"></script>


<script src="js/auth-guard.js"></script>

<script src="js/user-session.js"></script>
<script src="js/admin-ui-guard.js"></script>

<script src="js/role-guard.js"></script>
<script src="js/pwa-register.js"></script>
</body>
</html>
