<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Stock Movements | TYS POS</title>

    <link
        rel="stylesheet"
        href="styles.css">

    <link
        rel="manifest"
        href="manifest.json">

</head>

<body data-admin-page>

<div class="app-shell">

    <!-- HEADER -->

    <header class="topbar">

        <div>

            <p class="eyebrow">
                Inventory Control
            </p>

            <h1>
                Stock Movements
            </h1>

        </div>

        <div class="status-card">

            <strong>
                TYS General Store
            </strong>

            <nav
    id="main-navigation"
    class="top-nav">
</nav>

        </div>

    </header>

    <!-- STOCK CONTENT -->

    <main class="panel">

        <div class="section-heading">

            <h2>
                Stock History
            </h2>

            <p>
                View purchases, sales and manual stock adjustments.
            </p>

        </div>

        <div class="inventory-card">

            <div id="stock-history-list">

                <div class="empty-state">
                    No stock movements recorded.
                </div>

            </div>

        </div>

    </main>

</div>

<!-- SCRIPTS -->

<script src="inventory-seed.js"></script>

<script src="js/database.js"></script>

<script src="js/utils.js"></script>

<script src="js/stock.js"></script>
<script src="js/navigation.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase-config.js"></script>


<script src="js/auth-guard.js"></script>

<script src="js/user-session.js"></script>
<script src="js/admin-ui-guard.js"></script>

<script src="js/role-guard.js"></script>

<script src="js/pwa-register.js"></script>
</body>

</html>
